# =============================================================================
# Lite Server Monitor (LSM) - Main Configuration
# =============================================================================

# General Settings
LOG_LEVEL="INFO"
LOG_FILE="/var/log/lsm/lsm.log"

# Telegram Notifications
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# Email Notifications (SMTP)
EMAIL_ENABLED="false"
SMTP_SERVER=""
SMTP_PORT="587"
SMTP_TLS="on"
SMTP_USER=""
SMTP_PASS=""
SMTP_FROM=""

# Monitoring Thresholds
CPU_USAGE_WARN=80
CPU_USAGE_CRIT=90
RAM_USAGE_WARN=85
RAM_USAGE_CRIT=95
DISK_USAGE_WARN=85
DISK_USAGE_CRIT=95
