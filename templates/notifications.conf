# -----------------------------------------------------------------------------
# Lite Server Monitor (LSM) - Notification Settings
# -----------------------------------------------------------------------------

# --- Защита от спама (Anti-Spam / Throttling) ---
# Время ожидания перед повторной отправкой того же алерта (в секундах: 3600 = 1 час)
ALERT_COOLDOWN=3600

# --- Telegram Notifications ---
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# --- Email (SMTP) Notifications ---
EMAIL_ENABLED="false"
SMTP_SERVER="smtp.gmail.com"
SMTP_PORT="587"
SMTP_TLS="on"
SMTP_USERNAME=""
SMTP_FROM=""
SMTP_TO=""
